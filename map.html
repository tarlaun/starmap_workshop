<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Starlet Map Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      max-width: 460px;
      font-size: 14px;
      line-height: 1.4;
    }

    .info code {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      word-break: break-all;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="info">
    <div><strong>Starlet map example</strong></div>
    <div id="dataset-label"></div>
    <code id="tile-url"></code>
    <div id="status" class="status">Loading…</div>
  </div>

  <div id="map"></div>

  <script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const dataset = params.get("dataset") || "TIGER2018_COUNTY";

    const tileUrl = `${window.location.origin}/tiles/${dataset}/mvt/{z}/{x}/{y}.mvt`;

    document.getElementById("dataset-label").textContent = `Dataset: ${dataset}`;
    document.getElementById("tile-url").textContent = tileUrl;

    const statusEl = document.getElementById("status");

    const base = new ol.layer.Tile({
      source: new ol.source.OSM()
    });

    const mvtSource = new ol.source.VectorTile({
      format: new ol.format.MVT(),
      url: tileUrl
    });

    const mvt = new ol.layer.VectorTile({
      source: mvtSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: "rgba(8, 48, 107, 0.95)",
          width: 1.2
        }),
        fill: new ol.style.Fill({
          color: "rgba(77, 163, 255, 0.25)"
        }),
        image: new ol.style.Circle({
          radius: 4,
          fill: new ol.style.Fill({
            color: "rgba(217, 95, 14, 0.9)"
          }),
          stroke: new ol.style.Stroke({
            color: "#ffffff",
            width: 1
          })
        })
      })
    });

    const map = new ol.Map({
      target: "map",
      layers: [base, mvt],
      view: new ol.View({
        center: ol.proj.fromLonLat([-98.5, 39.5]),
        zoom: 3
      })
    });

    mvtSource.on("tileloadstart", () => {
      statusEl.textContent = "Loading vector tiles…";
    });

    mvtSource.on("tileloadend", () => {
      statusEl.textContent = "Vector tiles loaded.";
    });

    mvtSource.on("tileloaderror", () => {
      statusEl.textContent = "Tile load error. Check Flask console for missing tile paths.";
      console.error("Vector tile failed to load from:", tileUrl);
    });
  </script>
</body>
</html>
