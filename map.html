<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Riverside Parks — Dominant Vegetation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css" />

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; }
    #map { width: 100%; height: 100%; }

    #panel {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      max-width: 300px;
      font-size: 13px;
      line-height: 1.5;
    }

    #panel h3 { margin: 0 0 4px; font-size: 14px; color: #1a4a7a; }
    #panel p  { margin: 0 0 8px; color: #555; font-size: 12px; }
    #status   { font-size: 11px; color: #777; margin-top: 6px; }

    #legend { margin-top: 10px; max-height: 340px; overflow-y: auto; }
    #legend h4 { margin: 0 0 6px; font-size: 12px; color: #333; }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
      font-size: 11px;
      color: #444;
    }
    .legend-swatch {
      flex-shrink: 0;
      width: 14px; height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.2);
    }

    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: none;
      max-width: 240px;
      line-height: 1.5;
    }
    #tooltip strong { color: #1a4a7a; }
  </style>
</head>
<body>

<div id="panel">
  <h3>Riverside Parks</h3>
  <p>Dominant vegetation type per park</p>
  <div id="status">Loading…</div>
  <div id="legend"><h4>Vegetation types</h4></div>
</div>

<div id="map"></div>
<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>
<script>
  // ── Dataset from URL param ─────────────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const dataset = params.get("dataset") || "Parks_DominantVeg";
  const tileUrl = `${window.location.origin}/tiles/${dataset}/mvt/{z}/{x}/{y}.mvt`;

  // ── Categorical colour palette (tab20-style, 20 distinct colours) ──────────
  const PALETTE = [
    "#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
    "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ac",
    "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd",
    "#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf"
  ];

  const colorMap  = {};   // vegClass → hex color
  let   paletteIdx = 0;

  function colorFor(vegClass) {
    if (!vegClass || vegClass === "Unknown") return "#cccccc";
    if (!colorMap[vegClass]) {
      colorMap[vegClass] = PALETTE[paletteIdx % PALETTE.length];
      paletteIdx++;
    }
    return colorMap[vegClass];
  }

  // ── Style function ─────────────────────────────────────────────────────────
  const styleCache = new Map();

  function vegStyle(feature) {
    const veg = feature.get("dominant_vegetation") || "Unknown";
    if (!styleCache.has(veg)) {
      const hex = colorFor(veg);
      styleCache.set(veg, new ol.style.Style({
        stroke: new ol.style.Stroke({ color: "rgba(30,30,30,0.5)", width: 0.8 }),
        fill:   new ol.style.Fill({ color: hexToRgba(hex, 0.75) })
      }));
    }
    return styleCache.get(veg);
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ── Map layers ─────────────────────────────────────────────────────────────
  const mvtSource = new ol.source.VectorTile({
    format: new ol.format.MVT(),
    url: tileUrl
  });

  const map = new ol.Map({
    target: "map",
    layers: [
      new ol.layer.Tile({ source: new ol.source.OSM() }),
      new ol.layer.VectorTile({ source: mvtSource, style: vegStyle })
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([-117.37, 33.95]),  // Riverside, CA
      zoom: 11
    })
  });

  // ── Status messages ────────────────────────────────────────────────────────
  const statusEl = document.getElementById("status");
  mvtSource.on("tileloadstart", () => statusEl.textContent = "Loading tiles…");
  mvtSource.on("tileloadend",   () => {
    statusEl.textContent = "Ready.";
    buildLegend();
  });
  mvtSource.on("tileloaderror", () => {
    statusEl.textContent = "Tile load error — check the Flask console.";
  });

  // ── Legend (built after first tiles load) ─────────────────────────────────
  function buildLegend() {
    const legendEl = document.getElementById("legend");
    legendEl.innerHTML = "<h4>Vegetation types</h4>";

    // Collect all rendered veg classes from loaded features
    const seen = new Set();
    map.getLayers().getArray().forEach(layer => {
      if (layer instanceof ol.layer.VectorTile) {
        layer.getSource().getFeatures().forEach(f => {
          seen.add(f.get("dominant_vegetation") || "Unknown");
        });
      }
    });

    // Ensure Unknown is last
    const classes = [...seen].filter(v => v !== "Unknown").sort();
    if (seen.has("Unknown")) classes.push("Unknown");

    classes.forEach(cls => {
      const color = cls === "Unknown" ? "#cccccc" : colorFor(cls);
      const row = document.createElement("div");
      row.className = "legend-row";
      row.innerHTML = `
        <div class="legend-swatch" style="background:${color}"></div>
        <span>${cls}</span>
      `;
      legendEl.appendChild(row);
    });
  }

  // ── Tooltip on hover ──────────────────────────────────────────────────────
  const tooltipEl = document.getElementById("tooltip");

  map.on("pointermove", evt => {
    const feature = map.forEachFeatureAtPixel(evt.pixel, f => f, { hitTolerance: 2 });

    if (feature) {
      const name = feature.get("PARK_NAME") || "—";
      const veg  = feature.get("dominant_vegetation") || "Unknown";
      tooltipEl.innerHTML = `<strong>${name}</strong><br>Vegetation: ${veg}`;
      tooltipEl.style.display = "block";
      tooltipEl.style.left = (evt.pixel[0] + 14) + "px";
      tooltipEl.style.top  = (evt.pixel[1] + 14) + "px";
      map.getTargetElement().style.cursor = "pointer";
    } else {
      tooltipEl.style.display = "none";
      map.getTargetElement().style.cursor = "";
    }
  });
</script>
</body>
</html>
