<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starlet map example</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .info-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(420px, calc(100vw - 32px));
      padding: 14px 16px 12px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      color: #1f2a37;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    .info-panel h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .info-row {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .label {
      display: inline-block;
      min-width: 92px;
      font-weight: 700;
      color: #334155;
      vertical-align: top;
    }

    code {
      display: block;
      margin-top: 4px;
      padding: 8px 10px;
      background: #f1f5f9;
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      color: #0f172a;
      white-space: pre-wrap;
      word-break: break-all;
      user-select: text;
    }

    #status {
      font-weight: 600;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="info-panel">
    <h1>Starlet map example</h1>
    <div class="info-row"><span class="label">Dataset:</span> <span id="dataset-name"></span></div>
    <div class="info-row">
      <span class="label">Tile URL:</span>
      <code id="tile-url"></code>
    </div>
    <div class="info-row"><span class="label">Status:</span> <span id="status">Ready.</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
  <script>
    (function () {
      const defaultDataset = 'TIGER2018_COUNTY';
      const params = new URLSearchParams(window.location.search);
      const dataset = params.get('dataset') || defaultDataset;

      const templateUrl = `${window.location.origin}/tiles/${dataset}/mvt/{z}/{x}/{y}.mvt`;

      const datasetNameEl = document.getElementById('dataset-name');
      const tileUrlEl = document.getElementById('tile-url');
      const statusEl = document.getElementById('status');

      datasetNameEl.textContent = dataset;
      tileUrlEl.textContent = templateUrl;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function hashString(value) {
        let hash = 0;
        const text = String(value || '');
        for (let i = 0; i < text.length; i++) {
          hash = ((hash << 5) - hash) + text.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function regionFillColor(key) {
        const hash = hashString(key);
        const r = 35 + (hash % 120);
        const g = 70 + (Math.floor(hash / 120) % 120);
        const b = 120 + (Math.floor(hash / 240) % 110);
        return `rgba(${r}, ${g}, ${b}, 0.42)`;
      }

      const styleCache = new Map();

      function featureStyle(feature) {
        const geom = feature.getGeometry();
        const geomType = geom ? geom.getType() : 'Unknown';
        const key = feature.get('GEOID') || feature.get('NAME') || feature.getId() || 'default';
        const cacheKey = `${geomType}|${key}`;

        if (styleCache.has(cacheKey)) {
          return styleCache.get(cacheKey);
        }

        let style;

        if (geomType === 'Point' || geomType === 'MultiPoint') {
          style = new ol.style.Style({
            image: new ol.style.Circle({
              radius: 6,
              fill: new ol.style.Fill({
                color: 'rgba(217, 95, 14, 0.9)'
              }),
              stroke: new ol.style.Stroke({
                color: 'rgba(255, 255, 255, 1)',
                width: 1
              })
            })
          });
        } else if (
          geomType === 'Polygon' ||
          geomType === 'MultiPolygon' ||
          geomType === 'GeometryCollection'
        ) {
          style = new ol.style.Style({
            fill: new ol.style.Fill({
              color: regionFillColor(key)
            }),
            stroke: new ol.style.Stroke({
              color: 'rgba(8, 48, 107, 0.95)',
              width: 1.2
            })
          });
        } else {
          style = new ol.style.Style({
            stroke: new ol.style.Stroke({
              color: 'rgba(8, 48, 107, 0.95)',
              width: 1.2
            }),
            fill: new ol.style.Fill({
              color: regionFillColor(key)
            })
          });
        }

        styleCache.set(cacheKey, style);
        return style;
      }

      const base = new ol.layer.Tile({
        source: new ol.source.OSM()
      });

      const vectorSource = new ol.source.VectorTile({
        format: new ol.format.MVT(),
        url: templateUrl
      });

      vectorSource.on('tileloadstart', function () {
        setStatus('Loading vector tiles…');
      });

      vectorSource.on('tileloadend', function () {
        setStatus('Vector tiles loaded.');
      });

      vectorSource.on('tileloaderror', function () {
        setStatus('Vector tile load error. Check the Flask console.');
      });

      const vectorLayer = new ol.layer.VectorTile({
        source: vectorSource,
        style: featureStyle
      });

      const map = new ol.Map({
        target: 'map',
        layers: [base, vectorLayer],
        view: new ol.View({
          center: ol.proj.fromLonLat([-98.5, 39.5]),
          zoom: 3
        })
      });

      setStatus('Ready to load vector tiles.');
    })();
  </script>
</body>
</html>
