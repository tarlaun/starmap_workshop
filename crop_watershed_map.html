<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starlet map example</title>

  <!-- OpenLayers v9.2.4 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f5f7;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    .info-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: min(420px, calc(100vw - 32px));
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      padding: 16px 16px 14px;
      backdrop-filter: blur(6px);
      color: #16324f;
    }

    .info-panel h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .info-row {
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .label {
      display: inline-block;
      font-weight: 700;
      margin-right: 6px;
    }

    .status {
      padding: 10px 12px;
      border-radius: 12px;
      background: #eef4fb;
      color: #123a63;
      font-size: 13px;
      margin-top: 10px;
    }

    code {
      display: block;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: auto;
      white-space: pre;
      font-size: 12px;
      line-height: 1.45;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #5d6b7a;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="info-panel">
    <h1>Starlet map example</h1>

    <div class="info-row">
      <span class="label">Active dataset:</span>
      <span id="datasetName"></span>
    </div>

    <div class="info-row">
      <span class="label">Tile URL:</span>
      <code id="tileUrl"></code>
    </div>

    <div class="status" id="status">Ready.</div>
    <div class="hint">Use <code>?dataset=your_dataset_key</code> in the URL to switch datasets.</div>
  </div>

  <!-- OpenLayers v9.2.4 JS -->
  <script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const dataset = params.get('dataset') || 'crops_watersheds';

      const tileUrl = `${window.location.origin}/datasets/${dataset}/mvt/{z}/{x}/{y}.mvt`;

      const datasetNameEl = document.getElementById('datasetName');
      const tileUrlEl = document.getElementById('tileUrl');
      const statusEl = document.getElementById('status');

      datasetNameEl.textContent = dataset;
      tileUrlEl.textContent = tileUrl;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function hashString(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = ((hash << 5) - hash) + str.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function colorFromFeature(feature) {
        const key =
          feature.get('class_name') ||
          feature.get('watershed_name') ||
          feature.get('regional_basin') ||
          feature.get('subclass_name') ||
          feature.getId() ||
          JSON.stringify(feature.getProperties());

        const h = hashString(String(key));
        const r = 40 + (h % 120);
        const g = 70 + ((h >> 3) % 90);
        const b = 120 + ((h >> 6) % 100);
        return `rgba(${r}, ${g}, ${b}, 0.38)`;
      }

      const polygonFillCache = new WeakMap();

      const vectorTileSource = new ol.source.VectorTile({
        format: new ol.format.MVT(),
        url: tileUrl,
        wrapX: true
      });

      vectorTileSource.on('tileloadstart', function () {
        setStatus('Loading vector tiles…');
      });

      vectorTileSource.on('tileloadend', function () {
        setStatus('Vector tiles loaded.');
      });

      vectorTileSource.on('tileloaderror', function () {
        setStatus('Error loading vector tiles. Check the Flask console and tile endpoint logs.');
      });

      const vectorTileLayer = new ol.layer.VectorTile({
        source: vectorTileSource,
        style: function (feature) {
          const geom = feature.getGeometry();
          if (!geom) return null;

          const type = geom.getType();

          if (type === 'Point' || type === 'MultiPoint') {
            return new ol.style.Style({
              image: new ol.style.Circle({
                radius: 5,
                fill: new ol.style.Fill({
                  color: 'rgba(217, 95, 14, 0.9)'
                }),
                stroke: new ol.style.Stroke({
                  color: '#ffffff',
                  width: 1
                })
              })
            });
          }

          if (type === 'Polygon' || type === 'MultiPolygon') {
            let fill = polygonFillCache.get(feature);
            if (!fill) {
              fill = new ol.style.Fill({
                color: colorFromFeature(feature)
              });
              polygonFillCache.set(feature, fill);
            }

            return new ol.style.Style({
              fill: fill,
              stroke: new ol.style.Stroke({
                color: 'rgba(8, 48, 107, 0.95)',
                width: 1.2
              })
            });
          }

          return new ol.style.Style({
            stroke: new ol.style.Stroke({
              color: 'rgba(8, 48, 107, 0.8)',
              width: 1
            }),
            fill: new ol.style.Fill({
              color: 'rgba(8, 48, 107, 0.12)'
            })
          });
        }
      });

      const base = new ol.layer.Tile({
        source: new ol.source.OSM()
      });

      const map = new ol.Map({
        target: 'map',
        layers: [base, vectorTileLayer],
        view: new ol.View({
          center: ol.proj.fromLonLat([-98.5, 39.5]),
          zoom: 3
        })
      });

      setStatus('Ready.');
    })();
  </script>
</body>
</html>
